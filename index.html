<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Planning Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .gradient-header { background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const {
      LineChart, Line, BarChart, Bar, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
    } = Recharts;

    const COLORS = ['#2563eb', '#16a34a', '#d97706', '#7c3aed', '#0891b2', '#dc2626'];

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(v || 0);
    const fmtShort = (v) => {
      if (!v && v !== 0) return '$0';
      if (Math.abs(v) >= 1000000) return `$${(v / 1000000).toFixed(1)}M`;
      if (Math.abs(v) >= 1000) return `$${(v / 1000).toFixed(0)}K`;
      return `$${Math.round(v)}`;
    };

    const CurrencyInput = ({ label, value, onChange, small }) => (
      <div className={small ? "mb-2" : "mb-3"}>
        <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
        <div className="relative">
          <span className="absolute left-2" style={{top:'7px',color:'#9ca3af',fontSize:'14px'}}>$</span>
          <input
            type="number" min="0" value={value || ""}
            onChange={e => onChange(parseFloat(e.target.value) || 0)}
            placeholder="0"
            style={{paddingLeft:'20px'}}
            className="w-full pr-2 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
      </div>
    );

    const PctInput = ({ label, value, onChange }) => (
      <div className="mb-3">
        <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
        <div className="relative">
          <input
            type="number" step="0.1" value={value || ""}
            onChange={e => onChange(parseFloat(e.target.value) || 0)}
            className="w-full pl-3 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            style={{paddingRight:'28px'}}
          />
          <span className="absolute right-2" style={{top:'7px',color:'#9ca3af',fontSize:'14px'}}>%</span>
        </div>
      </div>
    );

    const NumInput = ({ label, value, onChange, min, max }) => (
      <div className="mb-3">
        <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
        <input
          type="number" value={value || ""} min={min} max={max}
          onChange={e => onChange(parseFloat(e.target.value) || 0)}
          className="w-full px-3 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
    );

    const TxtInput = ({ label, value, onChange, placeholder }) => (
      <div className="mb-3">
        <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
        <input
          type="text" value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          className="w-full px-3 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
    );

    const Card = ({ title, icon, children }) => (
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">
          {icon && <span className="mr-1">{icon}</span>}{title}
        </h3>
        {children}
      </div>
    );

    const Subtotal = ({ label, value, red }) => (
      <div className={`text-xs mt-3 pt-2 border-t border-gray-100 flex justify-between ${red ? 'text-red-600' : 'text-blue-700'}`}>
        <span>{label}</span>
        <span className="font-semibold">{fmt(value)}</span>
      </div>
    );

    const StatTile = ({ label, value, sub, bg }) => (
      <div className={`rounded-2xl p-4 ${bg}`}>
        <p className="text-xs font-medium mb-1" style={{opacity:0.7}}>{label}</p>
        <p className="text-xl font-bold">{value}</p>
        {sub && <p className="text-xs mt-0.5" style={{opacity:0.6}}>{sub}</p>}
      </div>
    );

    function App() {
      const [tab, setTab] = useState(0);

      const [household, setHousehold] = useState("My Household");
      const [age, setAge] = useState(38);
      const [retAge, setRetAge] = useState(65);

      const [checking, setChecking] = useState(0);
      const [savings, setSavings] = useState(0);
      const [moneyMkt, setMoneyMkt] = useState(0);

      const [brokerage, setBrokerage] = useState(0);
      const [rsus, setRsus] = useState(0);
      const [crypto, setCrypto] = useState(0);

      const [k401, setK401] = useState(0);
      const [roth401, setRoth401] = useState(0);
      const [ira, setIra] = useState(0);
      const [rothIra, setRothIra] = useState(0);
      const [pension, setPension] = useState(0);
      const [retOther, setRetOther] = useState(0);

      const [props_, setProps_] = useState([
        { name: "Primary Home", value: 0, mortgage: 0 },
        { name: "", value: 0, mortgage: 0 },
        { name: "", value: 0, mortgage: 0 },
      ]);
      const updProp = (i, f, v) => setProps_(p => p.map((x, j) => j === i ? { ...x, [f]: v } : x));

      const [vehicles, setVehicles] = useState(0);
      const [otherAssets, setOtherAssets] = useState(0);

      const [carLoan1, setCarLoan1] = useState(0);
      const [carLoan2, setCarLoan2] = useState(0);
      const [cc, setCc] = useState(0);
      const [studentLoan, setStudentLoan] = useState(0);
      const [otherDebt, setOtherDebt] = useState(0);

      const [income, setIncome] = useState(120000);
      const [annSavings, setAnnSavings] = useState(24000);
      const [retReturn, setRetReturn] = useState(7);
      const [inflation, setInflation] = useState(3);
      const [retIncome, setRetIncome] = useState(90000);
      const [ssMo, setSsMo] = useState(2200);

      const [kids, setKids] = useState([
        { on: false, name: "", age: 0, bal: 0, mo: 0, annCost: 35000, yrs: 4 },
        { on: false, name: "", age: 0, bal: 0, mo: 0, annCost: 35000, yrs: 4 },
        { on: false, name: "", age: 0, bal: 0, mo: 0, annCost: 35000, yrs: 4 },
        { on: false, name: "", age: 0, bal: 0, mo: 0, annCost: 35000, yrs: 4 },
      ]);
      const updKid = (i, f, v) => setKids(k => k.map((x, j) => j === i ? { ...x, [f]: v } : x));

      const c = useMemo(() => {
        const cash = checking + savings + moneyMkt;
        const inv = brokerage + rsus + crypto;
        const ret = k401 + roth401 + ira + rothIra + pension + retOther;
        const reVal = props_.reduce((s, p) => s + p.value, 0);
        const reMort = props_.reduce((s, p) => s + p.mortgage, 0);
        const otherA = vehicles + otherAssets;
        const totalAssets = cash + inv + ret + reVal + otherA;
        const totalLiab = reMort + carLoan1 + carLoan2 + cc + studentLoan + otherDebt;
        const netWorth = totalAssets - totalLiab;

        const assetPie = [
          { name: "Cash & Equiv", value: cash },
          { name: "Investments", value: inv },
          { name: "Retirement", value: ret },
          { name: "Real Estate", value: reVal },
          { name: "Other", value: otherA },
        ].filter(a => a.value > 0);

        const yrs = Math.max(0, retAge - age);
        const r = retReturn / 100;
        const inf = inflation / 100;
        let port = ret + inv;
        const retChart = [];
        const portTarget = Math.max(0, (retIncome - ssMo * 12)) / 0.04;
        for (let y = 0; y <= yrs; y++) {
          retChart.push({ age: age + y, portfolio: Math.round(port), target: Math.round(portTarget) });
          port = port * (1 + r) + annSavings;
        }
        const projPort = retChart[retChart.length - 1] ? retChart[retChart.length - 1].portfolio : 0;
        const gap = projPort - portTarget;

        const annWithdrawal = Math.max(0, retIncome - ssMo * 12);
        let pPort = projPort;
        const postChart = [];
        for (let y = 0; y <= 30; y++) {
          postChart.push({ age: retAge + y, portfolio: Math.max(0, Math.round(pPort)) });
          pPort = pPort * (1 + r) - annWithdrawal * Math.pow(1 + inf, y);
        }

        const collegeResults = kids.map(kid => {
          if (!kid.on || !kid.name) return null;
          const ytc = Math.max(0, 18 - kid.age);
          let bal = kid.bal;
          for (let y = 0; y < ytc; y++) bal = bal * 1.06 + kid.mo * 12;
          const futureCostPerYr = kid.annCost * Math.pow(1 + inf, ytc);
          const totalCost = futureCostPerYr * kid.yrs;
          const pct = totalCost > 0 ? Math.min(100, Math.round((bal / totalCost) * 100)) : 100;
          return { name: kid.name, age: kid.age, ytc, proj: Math.round(bal), cost: Math.round(totalCost), gap: Math.round(bal - totalCost), pct };
        }).filter(Boolean);

        return { cash, inv, ret, reVal, reMort, otherA, totalAssets, totalLiab, netWorth, assetPie, retChart, projPort, portTarget, gap, postChart, collegeResults, yrs };
      }, [checking, savings, moneyMkt, brokerage, rsus, crypto, k401, roth401, ira, rothIra, pension, retOther, props_, vehicles, otherAssets, carLoan1, carLoan2, cc, studentLoan, otherDebt, age, retAge, annSavings, retReturn, inflation, retIncome, ssMo, kids]);

      const TABS = ["📋 Inputs", "💰 Net Worth", "🏖️ Retirement", "🎓 College"];

      return (
        <div style={{minHeight:'100vh',background:'#f9fafb'}}>
          {/* Header */}
          <div className="gradient-header text-white px-6 py-4">
            <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
              <div>
                <h1 style={{fontSize:'20px',fontWeight:'700',margin:0}}>Financial Planning Dashboard</h1>
                <p style={{color:'#bfdbfe',fontSize:'13px',margin:'2px 0 0'}}>{household}</p>
              </div>
              <div style={{display:'flex',gap:'24px',textAlign:'right'}}>
                <div>
                  <p style={{color:'#93c5fd',fontSize:'11px',margin:0}}>Net Worth</p>
                  <p style={{fontSize:'18px',fontWeight:'700',margin:0,color: c.netWorth >= 0 ? 'white' : '#fca5a5'}}>{fmtShort(c.netWorth)}</p>
                </div>
                <div>
                  <p style={{color:'#93c5fd',fontSize:'11px',margin:0}}>Retire in</p>
                  <p style={{fontSize:'18px',fontWeight:'700',margin:0}}>{c.yrs} yrs</p>
                </div>
                <div>
                  <p style={{color:'#93c5fd',fontSize:'11px',margin:0}}>Proj. Portfolio</p>
                  <p style={{fontSize:'18px',fontWeight:'700',margin:0}}>{fmtShort(c.projPort)}</p>
                </div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div style={{background:'white',borderBottom:'1px solid #e5e7eb',position:'sticky',top:0,zIndex:20,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
            <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex'}}>
              {TABS.map((t, i) => (
                <button key={i} onClick={() => setTab(i)}
                  style={{
                    padding:'14px 20px', fontSize:'13px', fontWeight:'600', border:'none',
                    borderBottom: tab === i ? '2px solid #2563eb' : '2px solid transparent',
                    color: tab === i ? '#2563eb' : '#6b7280',
                    background:'none', cursor:'pointer'
                  }}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          <div style={{maxWidth:'1100px',margin:'0 auto',padding:'24px 16px'}}>

            {/* ── TAB 1: INPUTS ─────────────────────────────────────────────── */}
            {tab === 0 && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'16px'}}>

                <div style={{gridColumn:'1/-1'}}>
                  <Card title="Personal Information" icon="👤">
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px'}}>
                      <TxtInput label="Household / Name" value={household} onChange={setHousehold} placeholder="My Household" />
                      <NumInput label="Your Current Age" value={age} onChange={setAge} min={18} max={85} />
                      <NumInput label="Target Retirement Age" value={retAge} onChange={setRetAge} min={45} max={90} />
                    </div>
                  </Card>
                </div>

                <Card title="Cash & Equivalents" icon="🏦">
                  <CurrencyInput label="Checking Account(s)" value={checking} onChange={setChecking} />
                  <CurrencyInput label="Savings Account(s)" value={savings} onChange={setSavings} />
                  <CurrencyInput label="Money Market / CDs / T-Bills" value={moneyMkt} onChange={setMoneyMkt} />
                  <Subtotal label="Subtotal" value={c.cash} />
                </Card>

                <Card title="Investment Accounts" icon="📈">
                  <CurrencyInput label="Taxable Brokerage" value={brokerage} onChange={setBrokerage} />
                  <CurrencyInput label="RSUs / Stock Options (vested)" value={rsus} onChange={setRsus} />
                  <CurrencyInput label="Crypto / Other" value={crypto} onChange={setCrypto} />
                  <Subtotal label="Subtotal" value={c.inv} />
                </Card>

                <Card title="Retirement Accounts" icon="🏖️">
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                    <CurrencyInput label="401(k)" value={k401} onChange={setK401} small />
                    <CurrencyInput label="Roth 401(k)" value={roth401} onChange={setRoth401} small />
                    <CurrencyInput label="Traditional IRA" value={ira} onChange={setIra} small />
                    <CurrencyInput label="Roth IRA" value={rothIra} onChange={setRothIra} small />
                    <CurrencyInput label="Pension (PV)" value={pension} onChange={setPension} small />
                    <CurrencyInput label="Other Retirement" value={retOther} onChange={setRetOther} small />
                  </div>
                  <Subtotal label="Subtotal" value={c.ret} />
                </Card>

                <Card title="Other Assets" icon="🚗">
                  <CurrencyInput label="Vehicles (estimated value)" value={vehicles} onChange={setVehicles} />
                  <CurrencyInput label="Other Assets (jewelry, business, etc.)" value={otherAssets} onChange={setOtherAssets} />
                  <Subtotal label="Subtotal" value={c.otherA} />
                </Card>

                <div style={{gridColumn:'1/-1'}}>
                  <Card title="Real Estate" icon="🏠">
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'16px'}}>
                      {props_.map((p, i) => (
                        <div key={i} style={{background:'#f9fafb',borderRadius:'12px',padding:'16px'}}>
                          <TxtInput label={`Property ${i+1} Name`} value={p.name} onChange={v => updProp(i,'name',v)} placeholder={i===0?"Primary Home":`Property ${i+1}`} />
                          <CurrencyInput label="Estimated Market Value" value={p.value} onChange={v => updProp(i,'value',v)} />
                          <CurrencyInput label="Mortgage Balance" value={p.mortgage} onChange={v => updProp(i,'mortgage',v)} />
                          {p.value > 0 && <p style={{fontSize:'12px',color:'#15803d',fontWeight:'600',margin:'4px 0 0'}}>Equity: {fmt(p.value - p.mortgage)}</p>}
                        </div>
                      ))}
                    </div>
                    <Subtotal label="Total Real Estate Value" value={c.reVal} />
                  </Card>
                </div>

                <Card title="Liabilities (Non-Mortgage)" icon="💳">
                  <CurrencyInput label="Car Loan 1" value={carLoan1} onChange={setCarLoan1} />
                  <CurrencyInput label="Car Loan 2" value={carLoan2} onChange={setCarLoan2} />
                  <CurrencyInput label="Credit Card Debt" value={cc} onChange={setCc} />
                  <CurrencyInput label="Student Loans" value={studentLoan} onChange={setStudentLoan} />
                  <CurrencyInput label="Other Debt" value={otherDebt} onChange={setOtherDebt} />
                  <Subtotal label="Total Non-Mortgage Debt" value={c.totalLiab - c.reMort} red={true} />
                </Card>

                <Card title="Retirement Planning Inputs" icon="🎯">
                  <CurrencyInput label="Annual Household Income" value={income} onChange={setIncome} />
                  <CurrencyInput label="Annual Amount Saved for Retirement" value={annSavings} onChange={setAnnSavings} />
                  <CurrencyInput label="Desired Annual Retirement Income (today's $)" value={retIncome} onChange={setRetIncome} />
                  <CurrencyInput label="Expected Monthly Social Security" value={ssMo} onChange={setSsMo} />
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                    <PctInput label="Expected Annual Return" value={retReturn} onChange={setRetReturn} />
                    <PctInput label="Inflation Rate" value={inflation} onChange={setInflation} />
                  </div>
                </Card>

                <div style={{gridColumn:'1/-1'}}>
                  <Card title="College Savings (529 Plans)" icon="🎓">
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'16px'}}>
                      {kids.map((kid, i) => (
                        <div key={i} style={{background:'#f9fafb',borderRadius:'12px',padding:'16px'}}>
                          <label style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',cursor:'pointer'}}>
                            <input type="checkbox" checked={kid.on} onChange={e => updKid(i,'on',e.target.checked)} style={{width:'16px',height:'16px',accentColor:'#2563eb'}} />
                            <span style={{fontSize:'13px',fontWeight:'600',color:'#374151'}}>Child {i+1}{kid.name?` — ${kid.name}`:''}</span>
                          </label>
                          {kid.on && (
                            <div>
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                                <TxtInput label="Child's Name" value={kid.name} onChange={v => updKid(i,'name',v)} placeholder="Name" />
                                <NumInput label="Current Age" value={kid.age} onChange={v => updKid(i,'age',v)} min={0} max={17} />
                              </div>
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                                <CurrencyInput label="Current 529 Balance" value={kid.bal} onChange={v => updKid(i,'bal',v)} />
                                <CurrencyInput label="Monthly Contribution" value={kid.mo} onChange={v => updKid(i,'mo',v)} />
                              </div>
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                                <CurrencyInput label="Annual Cost (today's $)" value={kid.annCost} onChange={v => updKid(i,'annCost',v)} />
                                <NumInput label="Years of College" value={kid.yrs} onChange={v => updKid(i,'yrs',v)} min={1} max={6} />
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>

              </div>
            )}

            {/* ── TAB 2: NET WORTH ──────────────────────────────────────────── */}
            {tab === 1 && (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px',marginBottom:'16px'}}>
                  <StatTile label="Total Assets" value={fmt(c.totalAssets)} bg="bg-blue-50 text-blue-900" />
                  <StatTile label="Total Liabilities" value={fmt(c.totalLiab)} bg="bg-red-50 text-red-900" />
                  <StatTile label="Net Worth" value={fmt(c.netWorth)} bg={c.netWorth >= 0 ? "bg-green-50 text-green-900" : "bg-orange-50 text-orange-900"} />
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'16px'}}>
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'16px'}}>Asset Allocation</h3>
                    {c.assetPie.length > 0 ? (
                      <div>
                        <ResponsiveContainer width="100%" height={200}>
                          <PieChart>
                            <Pie data={c.assetPie} cx="50%" cy="50%" outerRadius={80} dataKey="value"
                              label={({name, percent}) => percent > 0.05 ? `${name} ${(percent*100).toFixed(0)}%` : ''}>
                              {c.assetPie.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                            </Pie>
                            <Tooltip formatter={v => fmt(v)} />
                          </PieChart>
                        </ResponsiveContainer>
                        <div style={{marginTop:'12px'}}>
                          {c.assetPie.map((a, i) => (
                            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'13px',padding:'4px 0',borderBottom:'1px solid #f3f4f6'}}>
                              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                <span style={{width:'10px',height:'10px',borderRadius:'50%',display:'inline-block',background:COLORS[i%COLORS.length]}}></span>
                                <span style={{color:'#6b7280'}}>{a.name}</span>
                              </div>
                              <span style={{fontWeight:'600'}}>{fmt(a.value)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <p style={{textAlign:'center',color:'#9ca3af',padding:'40px 0',fontSize:'13px'}}>Enter values on the Inputs tab</p>
                    )}
                  </div>

                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'16px'}}>Assets vs. Liabilities</h3>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={[
                        {name:"Assets", v: c.totalAssets},
                        {name:"Liabilities", v: c.totalLiab},
                        {name:"Net Worth", v: c.netWorth},
                      ]} margin={{top:5,right:10,bottom:5,left:10}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                        <XAxis dataKey="name" tick={{fontSize:11}} />
                        <YAxis tickFormatter={fmtShort} tick={{fontSize:11}} />
                        <Tooltip formatter={v => fmt(v)} />
                        <Bar dataKey="v" name="Amount" radius={[6,6,0,0]}>
                          <Cell fill="#2563eb" />
                          <Cell fill="#dc2626" />
                          <Cell fill={c.netWorth >= 0 ? "#16a34a" : "#f97316"} />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                    <div style={{marginTop:'16px'}}>
                      <p style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'8px'}}>Liability Breakdown</p>
                      {[
                        {label:"Mortgages", v:c.reMort},
                        {label:"Car Loans", v:carLoan1+carLoan2},
                        {label:"Credit Cards", v:cc},
                        {label:"Student Loans", v:studentLoan},
                        {label:"Other Debt", v:otherDebt},
                      ].filter(l => l.v > 0).map((l,i) => (
                        <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:'13px',padding:'4px 0',borderBottom:'1px solid #f9fafb'}}>
                          <span style={{color:'#6b7280'}}>{l.label}</span>
                          <span style={{color:'#dc2626',fontWeight:'600'}}>{fmt(l.v)}</span>
                        </div>
                      ))}
                      {c.totalLiab === 0 && <p style={{fontSize:'12px',color:'#9ca3af'}}>No liabilities entered</p>}
                    </div>
                  </div>
                </div>

                {c.reVal > 0 && (
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" style={{marginTop:'16px'}}>
                    <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'12px'}}>Real Estate Detail</h3>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'12px'}}>
                      {props_.filter(p => p.value > 0).map((p,i) => (
                        <div key={i} style={{background:'#f9fafb',borderRadius:'12px',padding:'14px'}}>
                          <p style={{fontWeight:'600',color:'#111827',fontSize:'14px',marginBottom:'8px'}}>{p.name||`Property ${i+1}`}</p>
                          <div style={{fontSize:'13px'}}>
                            <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}><span style={{color:'#6b7280'}}>Value</span><span style={{fontWeight:'600'}}>{fmt(p.value)}</span></div>
                            <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}><span style={{color:'#6b7280'}}>Mortgage</span><span style={{color:'#dc2626',fontWeight:'600'}}>{fmt(p.mortgage)}</span></div>
                            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0 0',borderTop:'1px solid #e5e7eb',marginTop:'4px'}}><span style={{fontWeight:'700'}}>Equity</span><span style={{color:'#15803d',fontWeight:'700'}}>{fmt(p.value-p.mortgage)}</span></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── TAB 3: RETIREMENT ─────────────────────────────────────────── */}
            {tab === 2 && (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'16px',marginBottom:'16px'}}>
                  <StatTile label="Years to Retirement" value={c.yrs} bg="bg-blue-50 text-blue-900" />
                  <StatTile label="Projected Portfolio" value={fmtShort(c.projPort)} bg="bg-purple-50 text-purple-900" />
                  <StatTile label="Target (4% rule)" value={fmtShort(c.portTarget)} bg="bg-yellow-50 text-yellow-900" />
                  <StatTile
                    label={c.gap >= 0 ? "Projected Surplus" : "Projected Shortfall"}
                    value={fmtShort(Math.abs(c.gap))}
                    bg={c.gap >= 0 ? "bg-green-50 text-green-900" : "bg-red-50 text-red-900"}
                    sub={c.gap >= 0 ? "You're on track 🎉" : "Consider saving more ⚠️"}
                  />
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:'16px',marginBottom:'16px'}}>
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'16px'}}>Portfolio Growth to Retirement</h3>
                    <ResponsiveContainer width="100%" height={250}>
                      <LineChart data={c.retChart} margin={{top:5,right:15,bottom:20,left:10}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                        <XAxis dataKey="age" label={{value:"Age",position:"insideBottom",offset:-10,fontSize:11}} tick={{fontSize:11}} />
                        <YAxis tickFormatter={fmtShort} tick={{fontSize:11}} />
                        <Tooltip formatter={v => fmt(v)} labelFormatter={l => `Age ${l}`} />
                        <Legend wrapperStyle={{fontSize:12}} />
                        <Line type="monotone" dataKey="portfolio" stroke="#2563eb" strokeWidth={2.5} dot={false} name="Projected Portfolio" />
                        <Line type="monotone" dataKey="target" stroke="#16a34a" strokeWidth={2} strokeDasharray="6 3" dot={false} name="Target" />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>

                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'16px'}}>Portfolio Drawdown in Retirement</h3>
                    <ResponsiveContainer width="100%" height={250}>
                      <LineChart data={c.postChart} margin={{top:5,right:15,bottom:20,left:10}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                        <XAxis dataKey="age" label={{value:"Age",position:"insideBottom",offset:-10,fontSize:11}} tick={{fontSize:11}} />
                        <YAxis tickFormatter={fmtShort} tick={{fontSize:11}} />
                        <Tooltip formatter={v => fmt(v)} labelFormatter={l => `Age ${l}`} />
                        <Line type="monotone" dataKey="portfolio" stroke="#7c3aed" strokeWidth={2.5} dot={false} name="Portfolio Balance" />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                  <h3 style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'16px'}}>Retirement Income Analysis</h3>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'24px'}}>
                    <div>
                      <p style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Desired Annual Income</p>
                      <p style={{fontSize:'20px',fontWeight:'700',color:'#111827'}}>{fmt(retIncome)}</p>
                      <p style={{fontSize:'11px',color:'#9ca3af'}}>in today's dollars</p>
                    </div>
                    <div>
                      <p style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Social Security (annual)</p>
                      <p style={{fontSize:'20px',fontWeight:'700',color:'#111827'}}>{fmt(ssMo*12)}</p>
                      <p style={{fontSize:'11px',color:'#9ca3af'}}>${ssMo.toLocaleString()}/mo</p>
                    </div>
                    <div>
                      <p style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Needed from Portfolio</p>
                      <p style={{fontSize:'20px',fontWeight:'700',color:'#111827'}}>{fmt(Math.max(0, retIncome - ssMo*12))}</p>
                      <p style={{fontSize:'11px',color:'#9ca3af'}}>annually (4% rule)</p>
                    </div>
                    <div>
                      <p style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Savings Rate</p>
                      <p style={{fontSize:'20px',fontWeight:'700',color:'#111827'}}>{income > 0 ? ((annSavings/income)*100).toFixed(1) : 0}%</p>
                      <p style={{fontSize:'11px',color:'#9ca3af'}}>{fmt(annSavings)}/yr saved</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── TAB 4: COLLEGE ────────────────────────────────────────────── */}
            {tab === 3 && (
              <div>
                {c.collegeResults.length === 0 ? (
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm" style={{padding:'64px',textAlign:'center'}}>
                    <p style={{fontSize:'48px',margin:'0 0 12px'}}>🎓</p>
                    <p style={{fontSize:'18px',fontWeight:'600',color:'#6b7280'}}>No children added yet</p>
                    <p style={{fontSize:'13px',color:'#9ca3af',marginTop:'8px'}}>Go to the Inputs tab → College Savings and enable children</p>
                  </div>
                ) : (
                  <div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'16px',marginBottom:'16px'}}>
                      {c.collegeResults.map((kid,i) => (
                        <StatTile key={i} label={kid.name} value={`${kid.pct}% funded`} sub={`${kid.ytc} yrs to college`}
                          bg={kid.pct>=100?"bg-green-50 text-green-900":kid.pct>=60?"bg-yellow-50 text-yellow-900":"bg-red-50 text-red-900"} />
                      ))}
                    </div>
                    {c.collegeResults.map((kid,i) => (
                      <div key={i} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" style={{marginBottom:'16px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                          <h3 style={{fontSize:'16px',fontWeight:'700',color:'#111827',margin:0}}>{kid.name}</h3>
                          <span style={{fontSize:'13px',color:'#6b7280'}}>Age {kid.age} · {kid.ytc} years until college</span>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'20px'}}>
                          <StatTile label="Projected 529 Balance" value={fmtShort(kid.proj)} bg="bg-blue-50 text-blue-900" />
                          <StatTile label="Projected Total Cost" value={fmtShort(kid.cost)} bg="bg-orange-50 text-orange-900" />
                          <StatTile label={kid.gap>=0?"Surplus":"Shortfall"} value={fmtShort(Math.abs(kid.gap))} bg={kid.gap>=0?"bg-green-50 text-green-900":"bg-red-50 text-red-900"} />
                          <StatTile label="Funding Progress" value={`${kid.pct}%`} bg={kid.pct>=100?"bg-green-50 text-green-900":"bg-purple-50 text-purple-900"} />
                        </div>
                        <div>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#6b7280',marginBottom:'6px'}}>
                            <span>Funding progress</span>
                            <span style={{fontWeight:'600'}}>{fmt(kid.proj)} of {fmt(kid.cost)}</span>
                          </div>
                          <div style={{width:'100%',background:'#f3f4f6',borderRadius:'999px',height:'14px',overflow:'hidden'}}>
                            <div style={{
                              width:`${Math.min(100,kid.pct)}%`, height:'14px', borderRadius:'999px',
                              background: kid.pct>=100?'#22c55e':kid.pct>=75?'#3b82f6':kid.pct>=50?'#f59e0b':'#ef4444',
                              transition:'width 0.5s'
                            }} />
                          </div>
                          {kid.gap < 0 && (
                            <p style={{fontSize:'12px',color:'#ef4444',marginTop:'8px'}}>
                              Additional monthly savings to close gap: ~{fmt(Math.abs(kid.gap)/(kid.ytc*12))}/mo
                            </p>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
