<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Planning Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; color: #111827; }
    input { font-family: inherit; }
    button { font-family: inherit; cursor: pointer; }
    .hdr { background: linear-gradient(135deg,#1d4ed8,#4338ca); color: white; padding: 16px 24px; }
    .hdr-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .hdr h1 { font-size: 20px; font-weight: 700; }
    .hdr p { font-size: 13px; color: #bfdbfe; margin-top: 2px; }
    .hdr-stats { display: flex; gap: 24px; text-align: right; }
    .hdr-stat p:first-child { font-size: 11px; color: #93c5fd; }
    .hdr-stat p:last-child { font-size: 18px; font-weight: 700; }
    .tabbar { background: white; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 20; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .tabbar-inner { max-width: 1100px; margin: 0 auto; display: flex; }
    .tabbar button { padding: 14px 22px; font-size: 13px; font-weight: 600; border: none; border-bottom: 2px solid transparent; color: #6b7280; background: none; transition: color .15s, border-color .15s; }
    .tabbar button.active { border-color: #2563eb; color: #2563eb; }
    .tabbar button:hover:not(.active) { color: #374151; }
    .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .full { grid-column: 1 / -1; }
    .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 20px; }
    .card-title { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }
    .tile { border-radius: 16px; padding: 16px; }
    .tile .t-label { font-size: 12px; font-weight: 500; opacity: .7; margin-bottom: 4px; }
    .tile .t-value { font-size: 22px; font-weight: 700; }
    .tile .t-sub { font-size: 11px; opacity: .6; margin-top: 2px; }
    .tile-blue { background: #eff6ff; color: #1e40af; }
    .tile-green { background: #f0fdf4; color: #166534; }
    .tile-red { background: #fef2f2; color: #991b1b; }
    .tile-orange { background: #fff7ed; color: #9a3412; }
    .tile-purple { background: #faf5ff; color: #5b21b6; }
    .tile-yellow { background: #fefce8; color: #854d0e; }
    label.field { display: block; font-size: 12px; font-weight: 500; color: #4b5563; margin-bottom: 4px; }
    .field-wrap { position: relative; margin-bottom: 12px; }
    .field-wrap input { width: 100%; padding: 6px 10px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; }
    .field-wrap input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }
    .field-wrap .sym { position: absolute; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 13px; pointer-events: none; }
    .field-wrap .sym-l { left: 8px; }
    .field-wrap .sym-r { right: 8px; }
    .field-wrap .has-left { padding-left: 20px; }
    .field-wrap .has-right { padding-right: 24px; }
    .subtotal { display: flex; justify-content: space-between; font-size: 12px; padding-top: 8px; margin-top: 8px; border-top: 1px solid #f3f4f6; }
    .subtotal.blue { color: #1d4ed8; font-weight: 600; }
    .subtotal.red { color: #dc2626; font-weight: 600; }
    .prop-box { background: #f9fafb; border-radius: 12px; padding: 14px; }
    .equity-tag { font-size: 11px; color: #15803d; font-weight: 600; margin-top: 4px; }
    .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: #374151; }
    .check-row input[type=checkbox] { width: 15px; height: 15px; accent-color: #2563eb; }
    .prog-bar-bg { width: 100%; background: #f3f4f6; border-radius: 999px; height: 14px; overflow: hidden; margin-top: 6px; }
    .prog-bar { height: 14px; border-radius: 999px; transition: width .5s; }
    .row-split { display: flex; gap: 12px; }
    .row-split > * { flex: 1; }
    .inline4 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
    .detail-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid #f9fafb; }
    .section-gap { margin-top: 16px; }
    .chart-wrap { position: relative; }
    .empty-state { text-align: center; padding: 64px 20px; }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { color: #6b7280; font-size: 16px; font-weight: 600; }
    .empty-state small { color: #9ca3af; font-size: 13px; display: block; margin-top: 6px; }
    .gap-note { font-size: 12px; color: #ef4444; margin-top: 8px; }
    @media (max-width: 640px) {
      .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
      .hdr-stats { gap: 12px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

// ── Formatters ───────────────────────────────────────────────────────────────
const fmt  = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(v||0);
const fmtS = v => {
  if (!v && v!==0) return '$0';
  const a = Math.abs(v);
  if (a>=1e6) return (v<0?'-':'')+'$'+(a/1e6).toFixed(1)+'M';
  if (a>=1e3) return (v<0?'-':'')+'$'+(a/1e3).toFixed(0)+'K';
  return (v<0?'-':'')+'$'+Math.round(a);
};
const COLORS = ['#2563eb','#16a34a','#d97706','#7c3aed','#0891b2','#dc2626'];

// ── Chart Components (Chart.js via useRef) ───────────────────────────────────
function LineChartC({ datasets, labels, height=240 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type: 'line',
      data: {
        labels,
        datasets: datasets.map(d => ({
          label: d.label,
          data: d.data,
          borderColor: d.color,
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.3,
          borderDash: d.dashed ? [6,3] : undefined,
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 12 } } } },
        scales: {
          y: { ticks: { callback: v => fmtS(v), font: { size: 11 } }, grid: { color: '#f0f0f0' } },
          x: { ticks: { maxTicksLimit: 8, font: { size: 11 } }, grid: { display: false } }
        }
      }
    });
    return () => inst.current && inst.current.destroy();
  }, [JSON.stringify(datasets), JSON.stringify(labels)]);
  return <canvas ref={ref} height={height} />;
}

function BarChartC({ labels, values, colors, height=220 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: colors, borderRadius: 8, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.raw) } } },
        scales: {
          y: { ticks: { callback: v => fmtS(v), font: { size: 11 } }, grid: { color: '#f0f0f0' } },
          x: { ticks: { font: { size: 12 } }, grid: { display: false } }
        }
      }
    });
    return () => inst.current && inst.current.destroy();
  }, [JSON.stringify(values), JSON.stringify(labels)]);
  return <canvas ref={ref} height={height} />;
}

function DonutChartC({ data, height=220 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d.name),
        datasets: [{ data: data.map(d => d.value), backgroundColor: COLORS, borderWidth: 2, borderColor: '#fff' }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 12 }, generateLabels: chart => {
            const ds = chart.data.datasets[0];
            return chart.data.labels.map((l, i) => ({
              text: `${l}: ${fmtS(ds.data[i])}`,
              fillStyle: ds.backgroundColor[i],
              strokeStyle: '#fff',
              hidden: false, index: i
            }));
          }}},
          tooltip: { callbacks: { label: c => fmt(c.raw) } }
        }
      }
    });
    return () => inst.current && inst.current.destroy();
  }, [JSON.stringify(data)]);
  return <canvas ref={ref} height={height} />;
}

// ── Input Helpers ────────────────────────────────────────────────────────────
const F = ({ label, children }) => (
  <div>
    <label className="field">{label}</label>
    {children}
  </div>
);
const Cur = ({ label, value, onChange }) => (
  <F label={label}>
    <div className="field-wrap">
      <span className="sym sym-l">$</span>
      <input type="number" min="0" className="has-left" value={value||''} placeholder="0"
        onChange={e => onChange(parseFloat(e.target.value)||0)} />
    </div>
  </F>
);
const Pct = ({ label, value, onChange }) => (
  <F label={label}>
    <div className="field-wrap">
      <input type="number" step="0.1" className="has-right" value={value||''} placeholder="0"
        onChange={e => onChange(parseFloat(e.target.value)||0)} />
      <span className="sym sym-r">%</span>
    </div>
  </F>
);
const Num = ({ label, value, onChange, min, max }) => (
  <F label={label}>
    <div className="field-wrap">
      <input type="number" value={value||''} min={min} max={max}
        onChange={e => onChange(parseFloat(e.target.value)||0)} />
    </div>
  </F>
);
const Txt = ({ label, value, onChange, placeholder }) => (
  <F label={label}>
    <div className="field-wrap">
      <input type="text" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} />
    </div>
  </F>
);
const Sub = ({ label, value, red }) => (
  <div className={`subtotal ${red?'red':'blue'}`}><span>{label}</span><span>{fmt(value)}</span></div>
);
const Tile = ({ label, value, sub, cls }) => (
  <div className={`tile ${cls}`}>
    <div className="t-label">{label}</div>
    <div className="t-value">{value}</div>
    {sub && <div className="t-sub">{sub}</div>}
  </div>
);

// ── App ──────────────────────────────────────────────────────────────────────
export default function App() {
  const [tab, setTab] = useState(0);

  // Personal
  const [name, setName]     = useState('My Household');
  const [age, setAge]       = useState(38);
  const [retAge, setRetAge] = useState(65);

  // Cash
  const [chk, setChk]   = useState(0);
  const [sav, setSav]   = useState(0);
  const [mkt, setMkt]   = useState(0);

  // Investments
  const [brok, setBrok] = useState(0);
  const [rsu, setRsu]   = useState(0);
  const [cry, setCry]   = useState(0);

  // Retirement accounts
  const [k1, setK1]     = useState(0);
  const [rk, setRk]     = useState(0);
  const [ir, setIr]     = useState(0);
  const [ri, setRi]     = useState(0);
  const [pe, setPe]     = useState(0);
  const [ro, setRo]     = useState(0);

  // Real estate
  const [props, setProps] = useState([
    {name:'Primary Home', val:0, mort:0},
    {name:'', val:0, mort:0},
    {name:'', val:0, mort:0},
  ]);
  const upP = (i,f,v) => setProps(p => p.map((x,j) => j===i?{...x,[f]:v}:x));

  // Other
  const [veh, setVeh] = useState(0);
  const [oth, setOth] = useState(0);

  // Liabilities
  const [cl1, setCl1] = useState(0);
  const [cl2, setCl2] = useState(0);
  const [cc, setCc]   = useState(0);
  const [sl, setSl]   = useState(0);
  const [od, setOd]   = useState(0);

  // Retirement inputs
  const [inc, setInc]   = useState(120000);
  const [ans, setAns]   = useState(24000);
  const [rer, setRer]   = useState(7);
  const [inf, setInf]   = useState(3);
  const [rin, setRin]   = useState(90000);
  const [ss, setSs]     = useState(2200);

  // Kids
  const [kids, setKids] = useState([
    {on:false,name:'',age:0,bal:0,mo:0,cost:35000,yrs:4},
    {on:false,name:'',age:0,bal:0,mo:0,cost:35000,yrs:4},
    {on:false,name:'',age:0,bal:0,mo:0,cost:35000,yrs:4},
    {on:false,name:'',age:0,bal:0,mo:0,cost:35000,yrs:4},
  ]);
  const upK = (i,f,v) => setKids(k => k.map((x,j) => j===i?{...x,[f]:v}:x));

  const c = useMemo(() => {
    const cash = chk+sav+mkt;
    const inv  = brok+rsu+cry;
    const ret  = k1+rk+ir+ri+pe+ro;
    const reV  = props.reduce((s,p) => s+p.val, 0);
    const reM  = props.reduce((s,p) => s+p.mort, 0);
    const otA  = veh+oth;
    const totA = cash+inv+ret+reV+otA;
    const totL = reM+cl1+cl2+cc+sl+od;
    const nw   = totA-totL;

    const pie  = [{name:'Cash',value:cash},{name:'Investments',value:inv},
                  {name:'Retirement',value:ret},{name:'Real Estate',value:reV},
                  {name:'Other',value:otA}].filter(x=>x.value>0);

    const yrs  = Math.max(0, retAge-age);
    const r    = rer/100;
    const i2   = inf/100;
    const tgt  = Math.max(0, rin-ss*12)/0.04;
    let port   = ret+inv;
    const rc   = [], rl = [];
    for (let y=0; y<=yrs; y++) {
      rc.push({age:age+y, portfolio:Math.round(port), target:Math.round(tgt)});
      rl.push(age+y);
      port = port*(1+r)+ans;
    }
    const pp  = rc[rc.length-1]?.portfolio||0;
    const gap = pp-tgt;

    const wd  = Math.max(0, rin-ss*12);
    let pv    = pp;
    const pc  = [], pl = [];
    for (let y=0; y<=30; y++) {
      pc.push(Math.max(0,Math.round(pv)));
      pl.push(retAge+y);
      pv = pv*(1+r)-wd*Math.pow(1+i2,y);
    }

    const coll = kids.map(kid => {
      if (!kid.on||!kid.name) return null;
      const ytc = Math.max(0,18-kid.age);
      let b = kid.bal;
      for (let y=0;y<ytc;y++) b = b*1.06+kid.mo*12;
      const fc = kid.cost*Math.pow(1+i2,ytc)*kid.yrs;
      const pct = fc>0?Math.min(100,Math.round(b/fc*100)):100;
      return {name:kid.name,age:kid.age,ytc,proj:Math.round(b),cost:Math.round(fc),gap:Math.round(b-fc),pct};
    }).filter(Boolean);

    return {cash,inv,ret,reV,reM,otA,totA,totL,nw,pie,rc,rl,pp,tgt,gap,pc,pl,coll,yrs};
  }, [chk,sav,mkt,brok,rsu,cry,k1,rk,ir,ri,pe,ro,props,veh,oth,cl1,cl2,cc,sl,od,age,retAge,ans,rer,inf,rin,ss,kids]);

  const TABS = ['📋 Inputs','💰 Net Worth','🏖️ Retirement','🎓 College'];

  return (
    <div>
      {/* Header */}
      <div className="hdr">
        <div className="hdr-inner">
          <div>
            <h1>Financial Planning Dashboard</h1>
            <p>{name}</p>
          </div>
          <div className="hdr-stats">
            <div className="hdr-stat"><p>Net Worth</p><p style={{color:c.nw>=0?'white':'#fca5a5'}}>{fmtS(c.nw)}</p></div>
            <div className="hdr-stat"><p>Retire in</p><p>{c.yrs} yrs</p></div>
            <div className="hdr-stat"><p>Proj. Portfolio</p><p>{fmtS(c.pp)}</p></div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabbar">
        <div className="tabbar-inner">
          {TABS.map((t,i) => (
            <button key={i} className={tab===i?'active':''} onClick={()=>setTab(i)}>{t}</button>
          ))}
        </div>
      </div>

      <div className="main">

        {/* ── INPUTS ─────────────────────────────────────────────────────── */}
        {tab===0 && (
          <div className="grid2">

            <div className="full">
              <div className="card">
                <div className="card-title">👤 Personal Information</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
                  <Txt label="Household / Name" value={name} onChange={setName} placeholder="My Household" />
                  <Num label="Your Current Age" value={age} onChange={setAge} min={18} max={85} />
                  <Num label="Target Retirement Age" value={retAge} onChange={setRetAge} min={45} max={90} />
                </div>
              </div>
            </div>

            <div className="card">
              <div className="card-title">🏦 Cash & Equivalents</div>
              <Cur label="Checking Account(s)" value={chk} onChange={setChk} />
              <Cur label="Savings Account(s)" value={sav} onChange={setSav} />
              <Cur label="Money Market / CDs / T-Bills" value={mkt} onChange={setMkt} />
              <Sub label="Subtotal" value={c.cash} />
            </div>

            <div className="card">
              <div className="card-title">📈 Investment Accounts</div>
              <Cur label="Taxable Brokerage" value={brok} onChange={setBrok} />
              <Cur label="RSUs / Stock Options (vested)" value={rsu} onChange={setRsu} />
              <Cur label="Crypto / Other" value={cry} onChange={setCry} />
              <Sub label="Subtotal" value={c.inv} />
            </div>

            <div className="card">
              <div className="card-title">🏖️ Retirement Accounts</div>
              <div className="inline4">
                <Cur label="401(k)" value={k1} onChange={setK1} />
                <Cur label="Roth 401(k)" value={rk} onChange={setRk} />
                <Cur label="Traditional IRA" value={ir} onChange={setIr} />
                <Cur label="Roth IRA" value={ri} onChange={setRi} />
                <Cur label="Pension (PV)" value={pe} onChange={setPe} />
                <Cur label="Other Retirement" value={ro} onChange={setRo} />
              </div>
              <Sub label="Subtotal" value={c.ret} />
            </div>

            <div className="card">
              <div className="card-title">🚗 Other Assets</div>
              <Cur label="Vehicles (estimated value)" value={veh} onChange={setVeh} />
              <Cur label="Other Assets (jewelry, business, etc.)" value={oth} onChange={setOth} />
              <Sub label="Subtotal" value={c.otA} />
            </div>

            <div className="full card">
              <div className="card-title">🏠 Real Estate</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'14px'}}>
                {props.map((p,i) => (
                  <div className="prop-box" key={i}>
                    <Txt label={`Property ${i+1} Name`} value={p.name} onChange={v=>upP(i,'name',v)} placeholder={i===0?'Primary Home':`Property ${i+1}`} />
                    <Cur label="Estimated Market Value" value={p.val} onChange={v=>upP(i,'val',v)} />
                    <Cur label="Mortgage Balance" value={p.mort} onChange={v=>upP(i,'mort',v)} />
                    {p.val>0 && <div className="equity-tag">Equity: {fmt(p.val-p.mort)}</div>}
                  </div>
                ))}
              </div>
              <Sub label="Total Real Estate Value" value={c.reV} />
            </div>

            <div className="card">
              <div className="card-title">💳 Liabilities (Non-Mortgage)</div>
              <Cur label="Car Loan 1" value={cl1} onChange={setCl1} />
              <Cur label="Car Loan 2" value={cl2} onChange={setCl2} />
              <Cur label="Credit Card Debt" value={cc} onChange={setCc} />
              <Cur label="Student Loans" value={sl} onChange={setSl} />
              <Cur label="Other Debt" value={od} onChange={setOd} />
              <Sub label="Total Non-Mortgage Debt" value={c.totL-c.reM} red={true} />
            </div>

            <div className="card">
              <div className="card-title">🎯 Retirement Planning Inputs</div>
              <Cur label="Annual Household Income" value={inc} onChange={setInc} />
              <Cur label="Annual Amount Saved for Retirement" value={ans} onChange={setAns} />
              <Cur label="Desired Annual Retirement Income (today's $)" value={rin} onChange={setRin} />
              <Cur label="Expected Monthly Social Security" value={ss} onChange={setSs} />
              <div className="row-split">
                <Pct label="Expected Annual Return" value={rer} onChange={setRer} />
                <Pct label="Inflation Rate" value={inf} onChange={setInf} />
              </div>
            </div>

            <div className="full card">
              <div className="card-title">🎓 College Savings (529 Plans)</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'14px'}}>
                {kids.map((kid,i) => (
                  <div className="prop-box" key={i}>
                    <label className="check-row">
                      <input type="checkbox" checked={kid.on} onChange={e=>upK(i,'on',e.target.checked)} />
                      Child {i+1}{kid.name?` — ${kid.name}`:''}
                    </label>
                    {kid.on && <>
                      <div className="row-split">
                        <Txt label="Name" value={kid.name} onChange={v=>upK(i,'name',v)} placeholder="Name" />
                        <Num label="Age" value={kid.age} onChange={v=>upK(i,'age',v)} min={0} max={17} />
                      </div>
                      <div className="row-split">
                        <Cur label="529 Balance" value={kid.bal} onChange={v=>upK(i,'bal',v)} />
                        <Cur label="Monthly Contrib." value={kid.mo} onChange={v=>upK(i,'mo',v)} />
                      </div>
                      <div className="row-split">
                        <Cur label="Annual Cost (today's $)" value={kid.cost} onChange={v=>upK(i,'cost',v)} />
                        <Num label="Years of College" value={kid.yrs} onChange={v=>upK(i,'yrs',v)} min={1} max={6} />
                      </div>
                    </>}
                  </div>
                ))}
              </div>
            </div>

          </div>
        )}

        {/* ── NET WORTH ───────────────────────────────────────────────────── */}
        {tab===1 && (
          <div>
            <div className="grid3" style={{marginBottom:'16px'}}>
              <Tile label="Total Assets" value={fmt(c.totA)} cls="tile-blue" />
              <Tile label="Total Liabilities" value={fmt(c.totL)} cls="tile-red" />
              <Tile label="Net Worth" value={fmt(c.nw)} cls={c.nw>=0?'tile-green':'tile-orange'} />
            </div>

            <div className="grid2">
              <div className="card">
                <div className="card-title">Asset Allocation</div>
                {c.pie.length>0
                  ? <DonutChartC data={c.pie} height={280} />
                  : <div className="empty-state"><p>Enter values on the Inputs tab</p></div>
                }
              </div>

              <div className="card">
                <div className="card-title">Assets vs. Liabilities</div>
                <BarChartC
                  labels={['Assets','Liabilities','Net Worth']}
                  values={[c.totA, c.totL, c.nw]}
                  colors={['#2563eb','#dc2626', c.nw>=0?'#16a34a':'#f97316']}
                  height={220}
                />
                <div style={{marginTop:'16px'}}>
                  <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',marginBottom:'8px'}}>Liability Breakdown</div>
                  {[
                    {l:'Mortgages',v:c.reM},
                    {l:'Car Loans',v:cl1+cl2},
                    {l:'Credit Cards',v:cc},
                    {l:'Student Loans',v:sl},
                    {l:'Other Debt',v:od},
                  ].filter(x=>x.v>0).map((x,i)=>(
                    <div className="detail-row" key={i}>
                      <span style={{color:'#6b7280'}}>{x.l}</span>
                      <span style={{color:'#dc2626',fontWeight:'600'}}>{fmt(x.v)}</span>
                    </div>
                  ))}
                  {c.totL===0 && <p style={{fontSize:'12px',color:'#9ca3af'}}>No liabilities entered</p>}
                </div>
              </div>
            </div>

            {c.reV>0 && (
              <div className="card section-gap">
                <div className="card-title">Real Estate Detail</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'12px'}}>
                  {props.filter(p=>p.val>0).map((p,i)=>(
                    <div className="prop-box" key={i}>
                      <div style={{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}}>{p.name||`Property ${i+1}`}</div>
                      <div className="detail-row"><span style={{color:'#6b7280'}}>Value</span><span style={{fontWeight:'600'}}>{fmt(p.val)}</span></div>
                      <div className="detail-row"><span style={{color:'#6b7280'}}>Mortgage</span><span style={{color:'#dc2626',fontWeight:'600'}}>{fmt(p.mort)}</span></div>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px',paddingTop:'6px',marginTop:'4px',borderTop:'1px solid #e5e7eb'}}>
                        <span style={{fontWeight:'700'}}>Equity</span>
                        <span style={{color:'#15803d',fontWeight:'700'}}>{fmt(p.val-p.mort)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── RETIREMENT ──────────────────────────────────────────────────── */}
        {tab===2 && (
          <div>
            <div className="grid4" style={{marginBottom:'16px'}}>
              <Tile label="Years to Retirement" value={c.yrs} cls="tile-blue" />
              <Tile label="Projected Portfolio" value={fmtS(c.pp)} cls="tile-purple" />
              <Tile label="Target (4% rule)" value={fmtS(c.tgt)} cls="tile-yellow" />
              <Tile
                label={c.gap>=0?'Projected Surplus':'Projected Shortfall'}
                value={fmtS(Math.abs(c.gap))}
                cls={c.gap>=0?'tile-green':'tile-red'}
                sub={c.gap>=0?"You're on track 🎉":"Consider saving more ⚠️"}
              />
            </div>

            <div className="grid2">
              <div className="card">
                <div className="card-title">Portfolio Growth to Retirement</div>
                <LineChartC
                  labels={c.rl}
                  datasets={[
                    {label:'Projected Portfolio', data:c.rc.map(x=>x.portfolio), color:'#2563eb'},
                    {label:'Target', data:c.rc.map(x=>x.target), color:'#16a34a', dashed:true},
                  ]}
                  height={240}
                />
              </div>
              <div className="card">
                <div className="card-title">Portfolio Drawdown in Retirement (30 yrs)</div>
                <LineChartC
                  labels={c.pl}
                  datasets={[{label:'Portfolio Balance', data:c.pc, color:'#7c3aed'}]}
                  height={240}
                />
              </div>
            </div>

            <div className="card section-gap">
              <div className="card-title">Retirement Income Analysis</div>
              <div className="grid4">
                <div>
                  <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Desired Annual Income</div>
                  <div style={{fontSize:'22px',fontWeight:'700'}}>{fmt(rin)}</div>
                  <div style={{fontSize:'11px',color:'#9ca3af'}}>in today's dollars</div>
                </div>
                <div>
                  <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Social Security (annual)</div>
                  <div style={{fontSize:'22px',fontWeight:'700'}}>{fmt(ss*12)}</div>
                  <div style={{fontSize:'11px',color:'#9ca3af'}}>${ss.toLocaleString()}/mo</div>
                </div>
                <div>
                  <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Needed from Portfolio</div>
                  <div style={{fontSize:'22px',fontWeight:'700'}}>{fmt(Math.max(0,rin-ss*12))}</div>
                  <div style={{fontSize:'11px',color:'#9ca3af'}}>annually (4% rule)</div>
                </div>
                <div>
                  <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'4px'}}>Savings Rate</div>
                  <div style={{fontSize:'22px',fontWeight:'700'}}>{inc>0?((ans/inc)*100).toFixed(1):0}%</div>
                  <div style={{fontSize:'11px',color:'#9ca3af'}}>{fmt(ans)}/yr saved</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── COLLEGE ─────────────────────────────────────────────────────── */}
        {tab===3 && (
          <div>
            {c.coll.length===0 ? (
              <div className="card">
                <div className="empty-state">
                  <div className="emoji">🎓</div>
                  <p>No children added yet</p>
                  <small>Go to the Inputs tab → College Savings and enable children</small>
                </div>
              </div>
            ) : (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px',marginBottom:'16px'}}>
                  {c.coll.map((k,i)=>(
                    <Tile key={i} label={k.name} value={`${k.pct}% funded`} sub={`${k.ytc} yrs to college`}
                      cls={k.pct>=100?'tile-green':k.pct>=60?'tile-yellow':'tile-red'} />
                  ))}
                </div>
                {c.coll.map((k,i)=>(
                  <div className="card section-gap" key={i}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                      <span style={{fontSize:'16px',fontWeight:'700'}}>{k.name}</span>
                      <span style={{fontSize:'13px',color:'#6b7280'}}>Age {k.age} · {k.ytc} years until college</span>
                    </div>
                    <div className="grid4" style={{marginBottom:'16px'}}>
                      <Tile label="Projected 529 Balance" value={fmtS(k.proj)} cls="tile-blue" />
                      <Tile label="Projected Total Cost" value={fmtS(k.cost)} cls="tile-orange" />
                      <Tile label={k.gap>=0?'Surplus':'Shortfall'} value={fmtS(Math.abs(k.gap))} cls={k.gap>=0?'tile-green':'tile-red'} />
                      <Tile label="Funding Progress" value={`${k.pct}%`} cls={k.pct>=100?'tile-green':'tile-purple'} />
                    </div>
                    <div>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#6b7280',marginBottom:'6px'}}>
                        <span>Funding progress</span>
                        <span style={{fontWeight:'600'}}>{fmt(k.proj)} of {fmt(k.cost)}</span>
                      </div>
                      <div className="prog-bar-bg">
                        <div className="prog-bar" style={{
                          width:`${Math.min(100,k.pct)}%`,
                          background: k.pct>=100?'#22c55e':k.pct>=75?'#3b82f6':k.pct>=50?'#f59e0b':'#ef4444'
                        }} />
                      </div>
                      {k.gap<0 && (
                        <p className="gap-note">Additional monthly savings needed: ~{fmt(Math.abs(k.gap)/(k.ytc*12))}/mo</p>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
